app = "cidadao360"
primary_region = "gru"

[build]

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "error"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/var/www/html/storage/database.sqlite"
  SESSION_DRIVER = "file"
  CACHE_STORE = "file"
  QUEUE_CONNECTION = "sync"
  FILESYSTEM_DISK = "local"
  APP_LOCALE = "pt_BR"
  APP_FALLBACK_LOCALE = "pt_BR"

[[mounts]]
  source = "storage"
  destination = "/var/www/html/storage"

[[services]]
  internal_port = 80
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.http_checks]]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    path = "/"
    protocol = "http"
    timeout = "15s"
